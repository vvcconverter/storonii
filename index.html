<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Проверка плеера на стороннем сайте (iframe)</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 1rem;
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #1a1a1a;
      color: #eee;
    }
    h1 { font-size: 1.25rem; margin-top: 0; }
    .panel {
      background: #252525;
      border: 1px solid #444;
      border-radius: 8px;
      padding: 1rem;
      margin-bottom: 1rem;
    }
    .panel label { display: block; margin-bottom: 0.25rem; color: #aaa; font-size: 0.9rem; }
    .panel input[type="url"],
    .panel input[type="text"] {
      width: 100%;
      max-width: 480px;
      padding: 0.5rem;
      margin-bottom: 0.75rem;
      background: #333;
      border: 1px solid #555;
      border-radius: 4px;
      color: #fff;
    }
    .panel input[type="checkbox"] { margin-right: 0.5rem; }
    .btn {
      padding: 0.5rem 1rem;
      background: #0d6efd;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.95rem;
    }
    .btn:hover { background: #0b5ed7; }
    #log {
      margin-top: 0.75rem;
      padding: 0.5rem;
      background: #111;
      border-radius: 4px;
      font-size: 0.85rem;
      color: #8f8;
      min-height: 2rem;
    }
    #player-frame {
      width: 100%;
      height: 400px;
      border: 1px solid #444;
      border-radius: 8px;
      background: #000;
    }
  </style>
</head>
<body>
  <div class="panel">
    <h1>Проверка плеера в iframe (сторонний сайт)</h1>
    <p style="color:#888; font-size:0.9rem;">
      Введите ссылку на видео и нажмите «Добавить в плеер» — плеер в iframe получит её через postMessage и начнёт воспроизведение.
    </p>
    <label for="videoUrl">URL видео</label>
    <input type="url" id="videoUrl" placeholder="https://example.com/video.mp4" value="">
    <label for="videoTitle">Название (необязательно)</label>
    <input type="text" id="videoTitle" placeholder="Моё видео">
    <label>
      <input type="checkbox" id="autoplay" checked>
      Автозапуск после добавления
    </label>
    <div style="margin-top:0.75rem;">
      <button type="button" class="btn" id="btnAdd">Добавить в плеер</button>
    </div>
    <div id="log"></div>
  </div>

  <div class="panel">
    <label>Плеер (iframe)</label>
    <iframe id="player-frame" src="../index.html" title="VVC Player"></iframe>
  </div>

  <script>
    (function() {
      const iframe = document.getElementById('player-frame');
      const videoUrl = document.getElementById('videoUrl');
      const videoTitle = document.getElementById('videoTitle');
      const autoplay = document.getElementById('autoplay');
      const btnAdd = document.getElementById('btnAdd');
      const log = document.getElementById('log');

      function showLog(msg, isError) {
        log.textContent = msg;
        log.style.color = isError ? '#f88' : '#8f8';
      }

      btnAdd.addEventListener('click', function() {
        const url = (videoUrl.value || '').trim();
        if (!url) {
          showLog('Введите URL видео.', true);
          return;
        }
        const target = iframe.contentWindow;
        if (!target) {
          showLog('Плеер ещё не загружен. Подождите и попробуйте снова.', true);
          return;
        }
        try {
          target.postMessage({
            type: 'vvc-add-video',
            url: url,
            title: (videoTitle.value || '').trim() || url.split('/').pop() || 'External video',
            autoplay: autoplay.checked
          }, '*');
          showLog('Отправлено в плеер: ' + url);
        } catch (e) {
          showLog('Ошибка: ' + e.message, true);
        }
      });

      window.addEventListener('message', function(event) {
        if (event.data && event.data.type === 'vvc-video-added' && event.data.success) {
          showLog('Плеер подтвердил: видео добавлено — ' + event.data.url);
        }
      });
    })();
  </script>
</body>
</html>
